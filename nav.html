<aside class="sidebar" aria-label="Site navigation">
  <div>
    <a href="/index.html" class="sidebar-name">Ruvi.</a>
    <nav aria-label="Page sections">
      <ul class="sidebar-nav">
        <li><a href="/index.html">Work</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/playground.html">Playground</a></li>
      </ul>
    </nav>
  </div>

  <div class="sidebar-contact" role="contentinfo" aria-label="Contact">
    <a href="#footer" class="contact-btn">Contact</a>
  </div>
</aside>

<header class="mobile-header" role="banner">
  <a href="/index.html" class="mobile-name">Ruvi.</a>
  <button
    class="mobile-menu-btn"
    aria-label="Open navigation menu"
    aria-expanded="false"
    aria-controls="mobileNav"
    id="mobileMenuBtn"
  >
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
  </button>
</header>

<nav id="mobileNav" class="mobile-nav" aria-label="Mobile navigation" hidden>
  <a href="/index.html">Work <span aria-hidden="true">→</span></a>
  <a href="/about.html">About <span aria-hidden="true">→</span></a>
  <a href="/playground.html">Playground <span aria-hidden="true">→</span></a>
  <a href="#footer">Contact <span aria-hidden="true">→</span></a>
</nav>

<script>
  // Mobile menu setup - runs automatically when nav is inserted
  const menuBtn = document.getElementById('mobileMenuBtn');
  const mobileNav = document.getElementById('mobileNav');

  if (menuBtn && mobileNav) {
    const closeMobileMenu = () => {
      menuBtn.setAttribute('aria-expanded', 'false');
      mobileNav.setAttribute('hidden', '');
      mobileNav.classList.remove('open');
      document.body.classList.remove('no-scroll');
    };

    menuBtn.addEventListener('click', () => {
      const isOpen = menuBtn.getAttribute('aria-expanded') === 'true';
      menuBtn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');

      if (!isOpen) {
        mobileNav.removeAttribute('hidden');
        mobileNav.classList.add('open');
        document.body.classList.add('no-scroll');
      } else {
        closeMobileMenu();
      }
    });

    // Close menu when a link is clicked
    mobileNav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', closeMobileMenu);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && mobileNav.classList.contains('open')) {
        closeMobileMenu();
        menuBtn.focus();
      }
    });
  }

  // Intercept Contact links and explicitly scroll to footer
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a[href="#footer"]');
    if (!link) return;
    e.preventDefault();
    var footer = document.getElementById('footer');
    if (footer) {
      footer.scrollIntoView({ behavior: 'smooth' });
    }
  });
</script>
